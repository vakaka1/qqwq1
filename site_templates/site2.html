<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{SERVICE_NAME}}</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #000000;
      --muted: #86868b;
      --primary: #000000;
      --secondary: #f5f5f7;
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .wrap {
      width: 100%;
      max-width: 480px;
      text-align: center;
    }

    header {
      margin-bottom: 60px;
    }

    .service-name {
      font-weight: 600;
      font-size: 21px;
      letter-spacing: -0.01em;
    }

    h1 {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 16px 0;
      line-height: 1.1;
    }

    .description {
      font-size: 19px;
      color: var(--muted);
      line-height: 1.4;
      margin-bottom: 48px;
      font-weight: 400;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-bottom: 48px;
      padding-bottom: 48px;
      border-bottom: 1px solid #f2f2f2;
    }

    .stat-val {
      display: block;
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 52px;
      border-radius: 26px;
      font-size: 17px;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .btn-main {
      background: var(--primary);
      color: #fff;
    }

    .btn-main:hover {
      opacity: 0.85;
      transform: scale(1.02);
    }

    .btn-sub {
      background: var(--secondary);
      color: var(--text);
    }

    .btn-sub:hover {
      background: #e8e8ed;
    }

    footer {
      margin-top: 60px;
      font-size: 14px;
      color: var(--muted);
    }

    @media (max-width: 480px) {
      h1 { font-size: 36px; }
      .description { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="service-name">{{SERVICE_NAME}}</div>
    </header>

    <main>
      <h1>Свобода<br>быть собой.</h1>
      <p class="description">
        Надежное соединение с миром без границ. 
        Простая настройка, моментальный запуск.
      </p>

      <div class="stats">
        <div>
          <span class="stat-val">{{SITE_TRIAL_DURATION_HOURS}}ч</span>
          <span class="stat-label">Доступ</span>
        </div>
        <div>
          <span class="stat-val">{{SITE_TRIAL_TOTAL_GB}} ГБ</span>
          <span class="stat-label">Трафик</span>
        </div>
      </div>

      <div class="actions">
        <a href="{{CONFIG_URL}}" class="btn btn-main">Получить доступ</a>
        <a href="{{TELEGRAM_URL}}" class="btn btn-sub">Открыть в Telegram</a>
      </div>
    </main>

    <footer>
      Ваша приватность под защитой современных протоколов.
    </footer>
  </div>
</body>
</html>
