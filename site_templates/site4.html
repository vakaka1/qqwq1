<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{SERVICE_NAME}} | Cyber Access</title>
  <style>
    :root {
      --bg: #0a0b10;
      --card: #12141c;
      --primary: #00f2ff;
      --secondary: #7000ff;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --glow: rgba(0, 242, 255, 0.4);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(112, 0, 255, 0.1) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(0, 242, 255, 0.05) 0%, transparent 40%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 500px;
      background: var(--card);
      border: 1px solid rgba(0, 242, 255, 0.15);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 242, 255, 0.05);
      position: relative;
      overflow: hidden;
    }

    .container::before {
      content: "";
      position: absolute;
      top: 0; left: 0; width: 100%; height: 4px;
      background: linear-gradient(90deg, var(--secondary), var(--primary));
    }

    .header { text-align: left; margin-bottom: 32px; }
    .brand {
      font-weight: 900;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--primary);
      text-shadow: 0 0 10px var(--glow);
    }

    h1 {
      font-size: 32px;
      font-weight: 800;
      margin: 12px 0;
      line-height: 1.2;
      background: linear-gradient(to right, #fff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .desc { color: var(--muted); font-size: 16px; line-height: 1.6; margin-bottom: 32px; }

    .meta {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
    }

    .badge {
      background: rgba(0, 242, 255, 0.05);
      border: 1px solid rgba(0, 242, 255, 0.1);
      padding: 8px 16px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      color: var(--primary);
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 60px;
      border-radius: 16px;
      font-size: 18px;
      font-weight: 700;
      text-decoration: none;
      margin-bottom: 12px;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: var(--primary);
      color: #000;
      box-shadow: 0 8px 24px var(--glow);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px var(--glow);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.03);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-secondary:hover { background: rgba(255, 255, 255, 0.08); }

    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="brand">{{SERVICE_NAME}}</div>
      <h1>Протокол доступа активирован</h1>
    </div>
    
    <p class="desc">Безопасное VLESS-соединение с минимальной задержкой. Твой пропуск в свободную сеть готов.</p>

    <div class="meta">
      <div class="badge">{{SITE_TRIAL_DURATION_HOURS}}H TTL</div>
      <div class="badge">{{SITE_TRIAL_TOTAL_GB}} GB DATA</div>
    </div>

    <a href="{{CONFIG_URL}}" class="btn btn-primary">Импортировать ключ</a>
    <a href="{{TELEGRAM_URL}}" class="btn btn-secondary">Telegram Bot</a>>
  </div>
</body>
</html>
